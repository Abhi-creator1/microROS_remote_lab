      content: >
        # Remote Robotics Laboratory


        Welcome to the **micro-ROS Robotics Laboratory**.


        This remote laboratory provides hands-on experience with ROS 2,
        micro-ROS, real-time embedded systems, robot visualization, and motion
        control. Through Edrys Lite, you will interact with both software tools
        and physical hardware using only a web browser.


        The laboratory combines microcontroller programming, ROS 2
        communication, robot visualization, and control of a real 4-DOF robotic
        arm, providing a complete robotics workflow from embedded devices to
        robotic applications.


        ---


        # Course Modules


        ## Module 1A – Creating a micro-ROS Firmware


        Learn how to create, compile, and upload a micro-ROS firmware to a
        Teensy 4.1 microcontroller. This module introduces embedded ROS 2
        applications and prepares the microcontroller for communication with ROS
        2.


        ## Module 1B – Connecting micro-ROS to ROS 2


        Learn how a micro-ROS Agent bridges a microcontroller and ROS 2.
        Discover topics, nodes, and message exchange between the Teensy and the
        ROS 2 ecosystem.


        ## Module 2 – RViz Visualization and Robot Modeling


        Learn robot visualization and robot description concepts using URDF and
        RViz. Explore robot models, coordinate frames, and interactive
        visualization tools used in modern robotics.


        ## Module 3 – Motion Control of a 4-DOF Robotic Arm


        Control a real robotic arm using ROS 2 and micro-ROS. Execute robot
        motions, monitor system behavior, and observe how embedded devices and
        ROS 2 work together in a complete robotic system.


        ---


        # Available Resources


        * ROS 2 Humble

        * micro-ROS

        * Arduino CLI

        * Teensy 4.1 Microcontroller

        * RViz

        * Camera Stream

        * Remote Linux Terminal

        * Real Robot Hardware


        ---


        # Before You Begin


        * Complete the modules in the order provided.

        * Read all instructions carefully before starting a task.

        * Use the camera stream to observe hardware behavior.

        * Verify each module's completion criteria before moving to the next
        module.

        * Contact the instructor if assistance is required.


        ---


        # Learning Path


        ```text

        Module 1A
            ↓
        Module 1B
            ↓
        Module 2
            ↓
        Module 3

        ```


        Students first create a micro-ROS firmware, then connect it to ROS 2,
        explore robot visualization tools, and finally control a real robotic
        arm through the complete ROS 2 and micro-ROS software stack.
