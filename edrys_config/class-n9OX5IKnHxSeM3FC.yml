        # Remote Robotics Laboratory


        Welcome to the micro-ROS Education Platform.


        This remote laboratory provides hands-on experience with **ROS 2**,
        **micro-ROS**, **RViz**, **MoveIt**, and a real **4-DOF ASRS robotic
        arm**. Through Edrys Lite, you will interact with both simulation and
        physical hardware using a web browser.


        ## Course Modules


        ### Module 1 – micro-ROS Based Microcontroller Control


        Learn how ROS 2 communicates with microcontrollers using micro-ROS and
        control basic hardware.


        ### Module 2 – RViz Visualization and GUI-Based Robot Control


        Learn robot modeling, visualization, and motion planning using URDF,
        RViz, and MoveIt.


        ### Module 3 – Motion Control of ASRS Robot


        Execute trajectories and control a real robotic arm using the complete
        ROS 2 and micro-ROS stack.


        ## Available Resources


        * ROS 2 Humble

        * micro-ROS

        * RViz

        * MoveIt

        * Camera Stream

        * Remote Terminal Access

        * Real Robot Hardware


        ## Before You Begin


        * Complete the modules in order.

        * Follow the instructions provided in each module.

        * Use the camera feed to observe robot behavior.

        * Contact the instructor if you need assistance.


        Enjoy exploring modern robotics through real-world experimentation.


        ## About This Platform


        This remote robotics laboratory was created as an educational initiative
        at Hochschule Schmalkalden to provide hands-on learning experiences in
        ROS 2, micro-ROS, robot motion planning, and real-world robotic systems
        through remote access technologies.
